# PTA V2 stack for the OCI Ampere A1 VM.
# OCI Load Balancer fronts the VM and terminates TLS, routing to app:3000,
# so there is no NGINX here. All images are multi-arch (arm64-ready).
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pta}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pta} -d ${POSTGRES_DB:-pta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not published to the host/LB — only reachable inside the compose network

  redis:
    image: redis:7
    restart: unless-stopped
    # AOF + volume so OI/candle history streams survive restarts & redeploys
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://${POSTGRES_USER:-pta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pta}
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID}
      DHAN_PIN: ${DHAN_PIN}
      DHAN_TOTP_SECRET: ${DHAN_TOTP_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Tuning knobs (config/pta.config.js reads these; empty = code default).
      # Compose does NOT forward .env into containers automatically — every
      # knob must be mapped here or it silently never reaches the app
      # (discovered 2026-07-10: all "env throttles" were no-ops).
      CHAIN_BUDGET_RPS: ${CHAIN_BUDGET_RPS:-}
      CHAIN_MIN_UNIQUE_GAP_MS: ${CHAIN_MIN_UNIQUE_GAP_MS:-}
      V2_FORMING_SCORE: ${V2_FORMING_SCORE:-}
      V2_STRENGTHENING_SCORE: ${V2_STRENGTHENING_SCORE:-}
      V2_READY_SCORE: ${V2_READY_SCORE:-}
      V2_MISS_TOLERANCE: ${V2_MISS_TOLERANCE:-}
      V2_STOP_BUFFER_PCT: ${V2_STOP_BUFFER_PCT:-}
      V2_STOP_VIOLATION_TOL: ${V2_STOP_VIOLATION_TOL:-}
      V2_MIN_TRIGGER_RR: ${V2_MIN_TRIGGER_RR:-}
      V2_STOCK_MIN_TRIGGER_RR: ${V2_STOCK_MIN_TRIGGER_RR:-}
      V2_MCX_MIN_TRIGGER_RR: ${V2_MCX_MIN_TRIGGER_RR:-}
    ports:
      - "3000:3000"   # OCI LB backend target

volumes:
  pgdata:
  redisdata:
